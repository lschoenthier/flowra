<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d6a4f">
  <title>Flowra</title>
  <style>
    :root {
      --green-dark: #1b4332;
      --green-mid: #2d6a4f;
      --green-light: #52b788;
      --green-pale: #d8f3dc;
      --bg: #f0f7f4;
      --card: #ffffff;
      --text: #1b4332;
      --text-muted: #74a98a;
      --border: #e0ede8;
      --shadow: 0 2px 10px rgba(0,0,0,0.07);
      --radius: 16px;
      --nav-h: 64px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    #app{height:100%;display:flex;flex-direction:column;position:relative}

    /* VIEWS */
    .view{display:none;flex-direction:column;height:100%;overflow:hidden}
    .view.active{display:flex}

    /* HEADER */
    .hdr{background:var(--green-mid);color:#fff;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
    .hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
    .hdr-back{background:none;border:none;color:#fff;display:flex;align-items:center;gap:4px;font-size:15px;cursor:pointer;padding:0;white-space:nowrap}
    .hdr-back svg{width:20px;height:20px}
    .user-chip{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 11px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}

    /* SCROLL AREA */
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--nav-h) + 20px + env(safe-area-inset-bottom))}
    .scroll-detail{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--nav-h) + 20px + env(safe-area-inset-bottom))}

    /* BOTTOM NAV */
    .bot-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;padding-bottom:env(safe-area-inset-bottom);z-index:100;height:calc(var(--nav-h) + env(safe-area-inset-bottom))}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text-muted);font-size:10px;font-weight:600;padding:4px 0;transition:color .15s}
    .nav-btn.active{color:var(--green-mid)}
    .nav-btn svg{width:22px;height:22px}
    .nav-fab{background:var(--green-mid);border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;margin-top:-10px;color:#fff;box-shadow:0 4px 14px rgba(45,106,79,.45);cursor:pointer}
    .nav-fab svg{width:26px;height:26px}

    /* SECTION TITLE */
    .sec{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px}

    /* PLANT CARD */
    .plant-card{background:#fff;border-radius:var(--radius);padding:12px;margin-bottom:9px;box-shadow:var(--shadow);display:flex;align-items:center;gap:11px;cursor:pointer;transition:transform .1s}
    .plant-card:active{transform:scale(.98)}
    .p-thumb{width:50px;height:50px;border-radius:11px;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
    .p-thumb img{width:100%;height:100%;object-fit:cover;border-radius:11px}
    .p-info{flex:1;min-width:0}
    .p-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .p-loc{font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .p-badges{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
    .badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .b-over{background:#fde8e8;color:#c62828}
    .b-today{background:#fff3e0;color:#e65100}
    .b-soon{background:#fffde7;color:#b45309}
    .b-ok{background:var(--green-pale);color:var(--green-mid)}
    .b-none{background:#f3f3f3;color:#999}

    /* DETAIL */
    .detail-hdr-info{padding:0 16px 14px;background:var(--green-mid);color:#fff}
    .detail-hdr-info h2{font-size:22px;font-weight:700}
    .detail-hdr-info p{font-size:13px;opacity:.8;margin-top:2px}

    /* CARE CARDS */
    .care-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .care-card{background:#fff;border-radius:var(--radius);padding:13px;box-shadow:var(--shadow)}
    .care-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .care-status{font-size:16px;font-weight:700;margin-bottom:5px;line-height:1.2}
    .care-dates{font-size:12px;color:var(--text-muted);line-height:1.6}
    .care-btn{display:block;width:100%;margin-top:9px;padding:8px;border:1.5px solid var(--green-light);background:none;border-radius:10px;color:var(--green-mid);font-size:13px;font-weight:600;cursor:pointer}
    .care-btn:active{background:var(--green-pale)}

    /* INFO CARD */
    .info-card{background:#fff;border-radius:var(--radius);padding:4px 14px;box-shadow:var(--shadow);margin-bottom:12px}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;gap:10px}
    .info-row:last-child{border-bottom:none}
    .info-lbl{color:var(--text-muted);font-size:13px;flex-shrink:0}
    .info-val{font-weight:500;text-align:right;word-break:break-word}

    /* PHOTOS */
    .photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
    .photo-wrap{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background:var(--green-pale)}
    .photo-wrap img{width:100%;height:100%;object-fit:cover}
    .photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.55);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .add-photo{aspect-ratio:1;border-radius:10px;border:2px dashed var(--green-light);background:var(--green-pale);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--green-mid);font-size:11px;font-weight:600;gap:4px}
    .add-photo svg{width:22px;height:22px}

    /* BUTTONS */
    .btn{width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:9px}
    .btn-primary{background:var(--green-mid);color:#fff}
    .btn-primary:active{background:var(--green-dark)}
    .btn-danger{background:#fde8e8;color:#c62828}

    /* BOTTOM SHEET */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}
    .overlay.open{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:0 18px 20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));animation:slideUp .22s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 18px}
    .sheet-title{font-size:18px;font-weight:700;margin-bottom:16px}

    /* FORM */
    .fg{margin-bottom:14px}
    .flbl{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
    .finput{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:11px;font-size:16px;color:var(--text);background:#fff;outline:none;-webkit-appearance:none;font-family:inherit}
    .finput:focus{border-color:var(--green-light)}
    textarea.finput{resize:none}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* EMPTY */
    .empty{text-align:center;padding:50px 20px;color:var(--text-muted)}
    .empty-icon{font-size:52px;margin-bottom:10px}
    .empty h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px}
    .empty p{font-size:14px}

    /* USER OPTIONS */
    .user-opt{background:#fff;border:2px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:11px;margin-bottom:9px;cursor:pointer;font-size:15px;font-weight:500}
    .user-opt.sel{border-color:var(--green-mid);background:var(--green-pale)}
    .u-avatar{width:42px;height:42px;border-radius:50%;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

    /* SETTINGS */
    .s-section{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
    .s-item{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:500}
    .s-item:last-child{border-bottom:none}
    .s-val{color:var(--text-muted);font-size:13px}

    /* IMAGE PREVIEW */
    .img-prev{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;align-items:center;justify-content:center}
    .img-prev.open{display:flex}
    .img-prev img{max-width:100%;max-height:100%;object-fit:contain}
    .img-prev-close{position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

    /* TOAST */
    .toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:var(--green-dark);color:#fff;padding:9px 16px;border-radius:20px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div id="app">

  <!-- VIEW: Home -->
  <div id="view-home" class="view active">
    <div class="hdr">
      <h1>🌿 Flowra</h1>
      <div id="user-chip" class="user-chip" onclick="openUserOverlay()">👤 ...</div>
    </div>
    <div class="scroll" id="plant-list"></div>
  </div>

  <!-- VIEW: Detail -->
  <div id="view-detail" class="view">
    <div class="hdr">
      <button class="hdr-back" onclick="showView('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Zurück
      </button>
    </div>
    <div class="detail-hdr-info">
      <h2 id="d-name"></h2>
      <p id="d-loc"></p>
    </div>
    <div class="scroll-detail" id="detail-body"></div>
  </div>

  <!-- VIEW: Settings -->
  <div id="view-settings" class="view">
    <div class="hdr"><h1>Einstellungen</h1></div>
    <div class="scroll" id="settings-body"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bot-nav">
    <div class="nav-btn active" id="nb-home" onclick="showView('home')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Pflanzen
    </div>
    <div class="nav-btn" id="nb-add" onclick="openAddPlant(null)">
      <div class="nav-fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </div>
    <div class="nav-btn" id="nb-settings" onclick="showView('settings')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      Einstellungen
    </div>
  </nav>
</div>

<!-- Sheet: Add/Edit Plant -->
<div class="overlay" id="ov-plant" onclick="closeOverlay('ov-plant',event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="form-title">Neue Pflanze</div>
    <div class="fg">
      <label class="flbl">Bezeichnung *</label>
      <input class="finput" id="f-name" type="text" placeholder="z.B. Monstera">
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Standort</label>
        <input class="finput" id="f-loc" type="text" placeholder="z.B. WZ Fenster">
      </div>
      <div class="fg">
        <label class="flbl">Bester Standort</label>
        <input class="finput" id="f-bloc" type="text" placeholder="z.B. Westfenster">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Gießintervall (Tage)</label>
        <input class="finput" id="f-wi" type="number" min="1" placeholder="7">
      </div>
      <div class="fg">
        <label class="flbl">Zuletzt gegossen</label>
        <input class="finput" id="f-lw" type="date">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Düngeintervall (Tage)</label>
        <input class="finput" id="f-fi" type="number" min="1" placeholder="30">
      </div>
      <div class="fg">
        <label class="flbl">Zuletzt gedüngt</label>
        <input class="finput" id="f-lf" type="date">
      </div>
    </div>
    <div class="fg">
      <label class="flbl">Gekauft / Umgetopft am</label>
      <input class="finput" id="f-pur" type="date">
    </div>
    <div class="fg">
      <label class="flbl">Notizen</label>
      <textarea class="finput" id="f-notes" rows="2" placeholder="Optionale Notizen..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="savePlant()">Speichern</button>
  </div>
</div>

<!-- Sheet: User Switcher -->
<div class="overlay" id="ov-user" onclick="closeOverlay('ov-user',event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Benutzer</div>
    <div id="user-list"></div>
    <button class="btn btn-primary" style="margin-top:6px" onclick="addUser()">+ Neuer Benutzer</button>
  </div>
</div>

<!-- Image Preview -->
<div class="img-prev" id="img-prev" onclick="closeImgPreview()">
  <button class="img-prev-close">✕</button>
  <img id="img-prev-src" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="photo-input" accept="image/*" multiple style="display:none">

<script>
// ── DATA ──────────────────────────────────────────────────────
const KEY = 'flowra_v1';

const SEED = [
  {name:'Aloe Vera',bestLocation:'Balkon',currentLocation:'Balkon',purchasedDate:'2026-05-27',wateringInterval:14,lastWatered:'2026-06-07',fertilizingInterval:49,lastFertilized:null,notes:'die große'},
  {name:'Aloe Vera',bestLocation:'Balkon',currentLocation:'SZ Fenster',purchasedDate:'2026-05-29',wateringInterval:14,lastWatered:'2026-06-07',fertilizingInterval:49,lastFertilized:null,notes:''},
  {name:'Bogenhanf',bestLocation:'Südfenster / Westfenster',currentLocation:'Bad Spiegel',purchasedDate:'',wateringInterval:21,lastWatered:'2026-05-29',fertilizingInterval:49,lastFertilized:null,notes:''},
  {name:'Bogenhanf',bestLocation:'Südfenster / Westfenster',currentLocation:'Regal WZ',purchasedDate:'',wateringInterval:21,lastWatered:'2026-05-30',fertilizingInterval:49,lastFertilized:null,notes:'komplett antrocknen lassen'},
  {name:'Dieffenbachie',bestLocation:'Ostfenster / Westfenster',currentLocation:'Nordfenster',purchasedDate:'2026-06-08',wateringInterval:7,lastWatered:'2026-06-08',fertilizingInterval:28,lastFertilized:null,notes:''},
  {name:'Dreimasterblume',bestLocation:'Südfenster / Westfenster',currentLocation:'Badfenster',purchasedDate:'2026-05-28',wateringInterval:6,lastWatered:'2026-06-08',fertilizingInterval:21,lastFertilized:null,notes:'Stecklinge'},
  {name:'Dreimasterblume',bestLocation:'Südfenster / Westfenster',currentLocation:'Badfenster 2',purchasedDate:'2026-05-28',wateringInterval:6,lastWatered:'2026-06-08',fertilizingInterval:21,lastFertilized:null,notes:'Stecklinge'},
  {name:'Dreimasterblume',bestLocation:'Südfenster / Westfenster',currentLocation:'SZ Schrank',purchasedDate:'2026-05-28',wateringInterval:6,lastWatered:'2026-06-08',fertilizingInterval:21,lastFertilized:null,notes:'Stecklinge'},
  {name:'Dreimasterblume',bestLocation:'Südfenster / Westfenster',currentLocation:'SZ Fenster',purchasedDate:'2026-05-28',wateringInterval:6,lastWatered:'2026-06-08',fertilizingInterval:21,lastFertilized:null,notes:'Stecklinge'},
  {name:'Grünlilie',bestLocation:'Westfenster',currentLocation:'Regal WZ',purchasedDate:'2026-05-27',wateringInterval:7,lastWatered:'2026-06-08',fertilizingInterval:21,lastFertilized:null,notes:''},
  {name:'Kakteen / Sukkulenten',bestLocation:'Südfenster / Westfenster',currentLocation:'SZ Fenster',purchasedDate:'',wateringInterval:21,lastWatered:'2026-05-29',fertilizingInterval:49,lastFertilized:null,notes:'die kleinen Dinger'},
  {name:'Kaktus',bestLocation:'Südfenster / Westfenster',currentLocation:'SZ Fenster',purchasedDate:'',wateringInterval:21,lastWatered:'2026-05-30',fertilizingInterval:49,lastFertilized:null,notes:''},
  {name:'Monstera',bestLocation:'Westfenster',currentLocation:'WZ Fenster',purchasedDate:'2026-05-30',wateringInterval:10,lastWatered:'2026-06-05',fertilizingInterval:14,lastFertilized:null,notes:''},
  {name:'Wüstenkohl',bestLocation:'Südfenster / Westfenster',currentLocation:'SZ Fenster',purchasedDate:'',wateringInterval:14,lastWatered:'2026-06-03',fertilizingInterval:49,lastFertilized:null,notes:''},
  {name:'Yucca',bestLocation:'Südfenster',currentLocation:'SZ Fenster',purchasedDate:'',wateringInterval:14,lastWatered:'2026-06-01',fertilizingInterval:35,lastFertilized:null,notes:'kleine'},
  {name:'Yucca',bestLocation:'Südfenster',currentLocation:'SZ Ecke',purchasedDate:'2026-06-03',wateringInterval:14,lastWatered:'2026-06-03',fertilizingInterval:35,lastFertilized:null,notes:'mittlere in der Ecke'},
];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

function initState(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return{
    activeUserId:'u1',
    users:[{id:'u1',name:'Ludwig',avatar:'🧑'},{id:'u2',name:'Freundin',avatar:'👩'}],
    plants:SEED.map(p=>({...p,id:uid(),photos:[]}))
  };
}

let S=initState();
function persist(){localStorage.setItem(KEY,JSON.stringify(S));}

// ── DATES ─────────────────────────────────────────────────────
function today(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function parseD(s){if(!s)return null;const d=new Date(s);return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function nextDate(last,interval){if(!last||!interval)return null;const d=parseD(last);return d?addDays(d,interval):null;}
function fmtD(s){if(!s)return'—';const d=parseD(s);return d?d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';}
function fmtObj(d){return d?d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';}
function todayISO(){return new Date().toISOString().split('T')[0];}

function status(next){
  if(!next)return{lbl:'—',cls:'b-none',u:99};
  const diff=Math.round((next-today())/86400000);
  if(diff<0)return{lbl:'⚠️ Fällig!',cls:'b-over',u:0};
  if(diff===0)return{lbl:'🔔 Heute!',cls:'b-today',u:1};
  if(diff<=2)return{lbl:'🔜 Bald',cls:'b-soon',u:2};
  return{lbl:'✅ OK',cls:'b-ok',u:3};
}

function urgency(p){
  return Math.min(
    status(nextDate(p.lastWatered,p.wateringInterval)).u,
    status(nextDate(p.lastFertilized,p.fertilizingInterval)).u
  );
}

// ── PHOTO DB (IndexedDB) ──────────────────────────────────────
let _db;
function openDB(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db);
    const r=indexedDB.open('flowra_photos',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('p');
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=rej;
  });
}
async function dbPut(k,v){const d=await openDB();return new Promise(res=>{const t=d.transaction('p','readwrite');t.objectStore('p').put(v,k);t.oncomplete=res;});}
async function dbGet(k){const d=await openDB();return new Promise(res=>{const r=d.transaction('p','readonly').objectStore('p').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});}
async function dbDel(k){const d=await openDB();return new Promise(res=>{const t=d.transaction('p','readwrite');t.objectStore('p').delete(k);t.oncomplete=res;});}
async function dbAll(){const d=await openDB();return new Promise(res=>{const out={};const t=d.transaction('p','readonly').objectStore('p');const r=t.openCursor();r.onsuccess=e=>{const c=e.target.result;if(c){out[c.key]=c.value;c.continue();}else res(out);};r.onerror=()=>res({});});}

function resizeImg(file){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      let{width:w,height:h}=img,M=1200;
      if(w>M||h>M){if(w>h){h=h*M/w;w=M;}else{w=w*M/h;h=M;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',.78));
    };img.src=url;
  });
}

// ── NAVIGATION ────────────────────────────────────────────────
let currentPlantId=null;

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  ['home','settings'].forEach(n=>{
    const el=document.getElementById('nb-'+n);
    if(el)el.classList.toggle('active',n===name);
  });
  if(name==='home')renderList();
  if(name==='settings')renderSettings();
}

// ── PLANT LIST ────────────────────────────────────────────────
function renderList(){
  const c=document.getElementById('plant-list');
  if(!S.plants.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🌱</div><h3>Noch keine Pflanzen</h3><p>Tippe auf + um deine erste Pflanze hinzuzufügen.</p></div>`;
    return;
  }
  const sorted=[...S.plants].sort((a,b)=>urgency(a)-urgency(b));
  const groups=[
    {title:'Handlungsbedarf',items:sorted.filter(p=>urgency(p)<=1)},
    {title:'Bald fällig',items:sorted.filter(p=>urgency(p)===2)},
    {title:'Alles gut',items:sorted.filter(p=>urgency(p)>=3)},
  ];
  let html='';
  groups.forEach(g=>{
    if(!g.items.length)return;
    html+=`<div class="sec">${g.title}</div>`;
    g.items.forEach(p=>{
      const ws=status(nextDate(p.lastWatered,p.wateringInterval));
      const fs=status(nextDate(p.lastFertilized,p.fertilizingInterval));
      html+=`<div class="plant-card" onclick="showPlant('${p.id}')">
        <div class="p-thumb" id="th-${p.id}">🌿</div>
        <div class="p-info">
          <div class="p-name">${esc(p.name)}</div>
          <div class="p-loc">${esc(p.currentLocation||'—')}</div>
          <div class="p-badges">
            <span class="badge ${ws.cls}">💧 ${ws.lbl}</span>
            <span class="badge ${fs.cls}">🌱 ${fs.lbl}</span>
          </div>
        </div>
      </div>`;
    });
  });
  c.innerHTML=html;
  // async load first photo thumbnails
  S.plants.forEach(async p=>{
    if(p.photos&&p.photos.length){
      const data=await dbGet(p.photos[0]);
      if(data){const el=document.getElementById('th-'+p.id);if(el)el.innerHTML=`<img src="${data}" alt="">`;}
    }
  });
}

// ── PLANT DETAIL ──────────────────────────────────────────────
async function showPlant(id){
  currentPlantId=id;
  const p=S.plants.find(x=>x.id===id);if(!p)return;
  document.getElementById('d-name').textContent=p.name;
  document.getElementById('d-loc').textContent=p.currentLocation||'';
  const wn=nextDate(p.lastWatered,p.wateringInterval);
  const fn=nextDate(p.lastFertilized,p.fertilizingInterval);
  const ws=status(wn),fs=status(fn);
  document.getElementById('detail-body').innerHTML=`
    <div class="care-row">
      <div class="care-card">
        <div class="care-title">💧 Gießen</div>
        <div class="care-status">${ws.lbl}</div>
        <div class="care-dates">Letztes: ${fmtD(p.lastWatered)}<br>Nächstes: ${fmtObj(wn)}<br>Alle ${p.wateringInterval||'—'} Tage</div>
        <button class="care-btn" onclick="markWatered('${p.id}')">✔ Jetzt gegossen</button>
      </div>
      <div class="care-card">
        <div class="care-title">🌱 Düngen</div>
        <div class="care-status">${fs.lbl}</div>
        <div class="care-dates">Letztes: ${fmtD(p.lastFertilized)}<br>Nächstes: ${fmtObj(fn)}<br>Alle ${p.fertilizingInterval||'—'} Tage</div>
        <button class="care-btn" onclick="markFertilized('${p.id}')">✔ Jetzt gedüngt</button>
      </div>
    </div>
    <div class="info-card">
      <div class="info-row"><span class="info-lbl">Bester Standort</span><span class="info-val">${esc(p.bestLocation||'—')}</span></div>
      <div class="info-row"><span class="info-lbl">Aktueller Standort</span><span class="info-val">${esc(p.currentLocation||'—')}</span></div>
      <div class="info-row"><span class="info-lbl">Gekauft / Umgetopft</span><span class="info-val">${fmtD(p.purchasedDate)}</span></div>
      ${p.notes?`<div class="info-row"><span class="info-lbl">Notizen</span><span class="info-val">${esc(p.notes)}</span></div>`:''}
    </div>
    <div class="sec" style="margin-top:4px">Fotos</div>
    <div class="info-card" style="padding:12px 14px">
      <div class="photos-grid" id="pgrid"></div>
    </div>
    <button class="btn btn-primary" onclick="openAddPlant('${p.id}')">Bearbeiten</button>
    <button class="btn btn-danger" onclick="deletePlant('${p.id}')">Löschen</button>
  `;
  showView('detail');
  document.getElementById('nb-home').classList.add('active');
  await renderPhotos(p);
}

async function renderPhotos(p){
  const grid=document.getElementById('pgrid');if(!grid)return;
  let html='';
  for(const pid of(p.photos||[])){
    const d=await dbGet(pid);
    if(d)html+=`<div class="photo-wrap"><img src="${d}" onclick="previewImg('${pid}')" alt=""><button class="photo-del" onclick="removePhoto('${p.id}','${pid}')">✕</button></div>`;
  }
  html+=`<label class="add-photo" for="photo-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="12" r="4"/></svg>Foto</label>`;
  grid.innerHTML=html;
}

// ── CARE ACTIONS ──────────────────────────────────────────────
function markWatered(id){
  const p=S.plants.find(x=>x.id===id);if(!p)return;
  p.lastWatered=todayISO();persist();showPlant(id);toast('💧 Gegossen!');
}
function markFertilized(id){
  const p=S.plants.find(x=>x.id===id);if(!p)return;
  p.lastFertilized=todayISO();persist();showPlant(id);toast('🌱 Gedüngt!');
}

// ── ADD / EDIT PLANT ──────────────────────────────────────────
let _editId=null;

function openAddPlant(id){
  _editId=id||null;
  document.getElementById('form-title').textContent=id?'Pflanze bearbeiten':'Neue Pflanze';
  const p=id?S.plants.find(x=>x.id===id):null;
  document.getElementById('f-name').value=p?p.name:'';
  document.getElementById('f-loc').value=p?p.currentLocation||'':'';
  document.getElementById('f-bloc').value=p?p.bestLocation||'':'';
  document.getElementById('f-wi').value=p?p.wateringInterval||'':'';
  document.getElementById('f-lw').value=p?p.lastWatered||'':'';
  document.getElementById('f-fi').value=p?p.fertilizingInterval||'':'';
  document.getElementById('f-lf').value=p?p.lastFertilized||'':'';
  document.getElementById('f-pur').value=p?p.purchasedDate||'':'';
  document.getElementById('f-notes').value=p?p.notes||'':'';
  document.getElementById('ov-plant').classList.add('open');
}

function savePlant(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Bitte einen Namen eingeben.');return;}
  const d={
    name,
    currentLocation:document.getElementById('f-loc').value.trim(),
    bestLocation:document.getElementById('f-bloc').value.trim(),
    wateringInterval:parseInt(document.getElementById('f-wi').value)||null,
    lastWatered:document.getElementById('f-lw').value||null,
    fertilizingInterval:parseInt(document.getElementById('f-fi').value)||null,
    lastFertilized:document.getElementById('f-lf').value||null,
    purchasedDate:document.getElementById('f-pur').value||null,
    notes:document.getElementById('f-notes').value.trim(),
  };
  if(_editId){const p=S.plants.find(x=>x.id===_editId);if(p)Object.assign(p,d);}
  else{S.plants.push({...d,id:uid(),photos:[]});}
  persist();
  document.getElementById('ov-plant').classList.remove('open');
  if(_editId){showPlant(_editId);toast('Gespeichert!');}
  else{showView('home');toast('Pflanze hinzugefügt!');}
}

function deletePlant(id){
  const p=S.plants.find(x=>x.id===id);if(!p)return;
  if(!confirm(`"${p.name}" wirklich löschen?`))return;
  S.plants=S.plants.filter(x=>x.id!==id);
  persist();showView('home');toast('Pflanze gelöscht.');
}

// ── PHOTOS ────────────────────────────────────────────────────
document.getElementById('photo-input').addEventListener('change',async function(e){
  if(!currentPlantId)return;
  const p=S.plants.find(x=>x.id===currentPlantId);if(!p)return;
  for(const f of Array.from(e.target.files)){
    const data=await resizeImg(f);
    const pid=uid();
    p.photos=[...(p.photos||[]),pid];
    await dbPut(pid,data);
  }
  this.value='';persist();
  await renderPhotos(p);toast('Foto hinzugefügt!');
});

async function removePhoto(plantId,photoId){
  if(!confirm('Foto löschen?'))return;
  const p=S.plants.find(x=>x.id===plantId);if(!p)return;
  p.photos=(p.photos||[]).filter(x=>x!==photoId);
  await dbDel(photoId);persist();
  await renderPhotos(p);
}

async function previewImg(photoId){
  const data=await dbGet(photoId);if(!data)return;
  document.getElementById('img-prev-src').src=data;
  document.getElementById('img-prev').classList.add('open');
}
function closeImgPreview(){document.getElementById('img-prev').classList.remove('open');}

// ── USERS ─────────────────────────────────────────────────────
function renderChip(){
  const u=S.users.find(x=>x.id===S.activeUserId)||S.users[0];
  document.getElementById('user-chip').textContent=(u.avatar||'👤')+' '+u.name;
}

function openUserOverlay(){
  const list=document.getElementById('user-list');
  list.innerHTML=S.users.map(u=>`
    <div class="user-opt ${u.id===S.activeUserId?'sel':''}" onclick="selectUser('${u.id}')">
      <div class="u-avatar">${u.avatar||'👤'}</div>
      <span>${esc(u.name)}</span>
      ${u.id===S.activeUserId?'<span style="margin-left:auto;color:var(--green-mid)">✓</span>':''}
    </div>`).join('');
  document.getElementById('ov-user').classList.add('open');
}

function selectUser(id){
  S.activeUserId=id;persist();renderChip();
  document.getElementById('ov-user').classList.remove('open');
  toast('Benutzer gewechselt!');
}

function addUser(){
  document.getElementById('ov-user').classList.remove('open');
  const name=prompt('Name des neuen Benutzers:');
  if(!name||!name.trim())return;
  const avs=['🌺','🌸','🍀','🌻','🌼','🌷','🌙','⭐'];
  const u={id:uid(),name:name.trim(),avatar:avs[S.users.length%avs.length]};
  S.users.push(u);persist();
  selectUser(u.id);
}

// ── SETTINGS ──────────────────────────────────────────────────
function renderSettings(){
  document.getElementById('settings-body').innerHTML=`
    <div class="sec">Benutzer</div>
    <div class="s-section">
      ${S.users.map(u=>`
        <div class="s-item">
          <span>${u.avatar} ${esc(u.name)}</span>
          ${S.users.length>1&&u.id!==S.activeUserId
            ?`<button onclick="removeUser('${u.id}')" style="background:none;border:none;color:#c62828;font-size:13px;cursor:pointer;font-weight:600">Entfernen</button>`
            :`<span class="s-val">${u.id===S.activeUserId?'Aktiv':''}</span>`}
        </div>`).join('')}
      <div class="s-item" onclick="addUserFromSettings()" style="color:var(--green-mid)">
        <span>+ Benutzer hinzufügen</span>
      </div>
    </div>
    <div class="sec">Daten</div>
    <div class="s-section">
      <div class="s-item" onclick="exportData()"><span>Daten exportieren</span><span class="s-val">Teilen →</span></div>
      <div class="s-item" onclick="importData()"><span>Daten importieren</span><span class="s-val">Einfügen →</span></div>
    </div>
    <div class="sec">Info</div>
    <div class="s-section">
      <div class="s-item"><span>Pflanzen</span><span class="s-val">${S.plants.length}</span></div>
      <div class="s-item"><span>Version</span><span class="s-val">1.0</span></div>
    </div>
    <p style="font-size:12px;color:var(--text-muted);text-align:center;padding:16px 0">
      Daten werden lokal auf diesem Gerät gespeichert.<br>
      Nutze Export/Import zum Synchronisieren zwischen Geräten.
    </p>
  `;
}

function removeUser(id){
  if(!confirm('Benutzer entfernen?'))return;
  S.users=S.users.filter(u=>u.id!==id);
  if(S.activeUserId===id)S.activeUserId=S.users[0]?.id;
  persist();renderChip();renderSettings();
}

function addUserFromSettings(){
  const name=prompt('Name des neuen Benutzers:');
  if(!name||!name.trim())return;
  const avs=['🌺','🌸','🍀','🌻','🌼','🌷'];
  const u={id:uid(),name:name.trim(),avatar:avs[S.users.length%avs.length]};
  S.users.push(u);persist();renderSettings();
}

async function exportData(){
  // Export plant data only (photos stay in IndexedDB - device-local)
  const photos=await dbAll();
  const payload=JSON.stringify({...S,_photos:photos});
  if(navigator.share){
    try{await navigator.share({text:payload,title:'Flowra Pflanzendaten'});return;}catch(e){}
  }
  try{await navigator.clipboard.writeText(payload);toast('Daten in Zwischenablage kopiert!');}
  catch(e){
    const ta=document.createElement('textarea');ta.value=payload;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);toast('Daten in Zwischenablage kopiert!');
  }
}

async function importData(){
  const txt=prompt('Exportierte Daten hier einfügen:');
  if(!txt)return;
  try{
    const parsed=JSON.parse(txt);
    if(!parsed.plants||!parsed.users)throw new Error('Ungültiges Format');
    const photos=parsed._photos||{};
    delete parsed._photos;
    S=parsed;persist();
    // restore photos to IndexedDB
    for(const[k,v]of Object.entries(photos))await dbPut(k,v);
    renderChip();showView('home');toast('Daten importiert!');
  }catch(e){alert('Fehler: '+e.message);}
}

// ── OVERLAY / UTILS ───────────────────────────────────────────
function closeOverlay(id,e){
  if(e&&e.target!==document.getElementById(id))return;
  document.getElementById(id).classList.remove('open');
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastT;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────
renderChip();
renderList();
</script>
</body>
</html>
