<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d6a4f">
  <title>Flowra</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- VIEW: Home -->
  <div id="view-home" class="view active">
    <div class="hdr hdr-home">
      <div class="hdr-greet">
        <div class="hdr-brand">🌿 Flowra</div>
        <div class="hdr-hi" id="greet-name">Hallo</div>
      </div>
      <div id="user-chip" class="user-chip" onclick="openUserOverlay()">👤 ...</div>
    </div>
    <div class="scroll" id="plant-list"></div>
  </div>

  <!-- VIEW: Detail -->
  <div id="view-detail" class="view">
    <div class="hdr">
      <button class="hdr-back" onclick="showView('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Zurück
      </button>
    </div>
    <div class="detail-hdr-info">
      <h2 id="d-name"></h2>
      <p id="d-loc"></p>
    </div>
    <div class="scroll-detail" id="detail-body"></div>
  </div>

  <!-- VIEW: Settings -->
  <div id="view-settings" class="view">
    <div class="hdr"><h1>Einstellungen</h1></div>
    <div class="scroll" id="settings-body"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bot-nav">
    <div class="nav-btn active" id="nb-home" onclick="showView('home')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Pflanzen
    </div>
    <div class="nav-btn" id="nb-add" onclick="openAddPlant(null)">
      <div class="nav-fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </div>
    <div class="nav-btn" id="nb-settings" onclick="showView('settings')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      Einstellungen
    </div>
  </nav>
</div>

<!-- Sheet: Add/Edit Plant -->
<div class="overlay" id="ov-plant" onclick="closeOverlay('ov-plant',event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="form-title">Neue Pflanze</div>
    <div class="fg">
      <label class="flbl">Bezeichnung *</label>
      <input class="finput" id="f-name" type="text" placeholder="z.B. Monstera">
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Standort</label>
        <input class="finput" id="f-loc" type="text" placeholder="z.B. WZ Fenster">
      </div>
      <div class="fg">
        <label class="flbl">Bester Standort</label>
        <input class="finput" id="f-bloc" type="text" placeholder="z.B. Westfenster">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Gießintervall (Tage)</label>
        <input class="finput" id="f-wi" type="number" min="1" placeholder="7">
      </div>
      <div class="fg">
        <label class="flbl">Zuletzt gegossen</label>
        <input class="finput" id="f-lw" type="date">
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">Düngeintervall (Tage)</label>
        <input class="finput" id="f-fi" type="number" min="1" placeholder="30">
      </div>
      <div class="fg">
        <label class="flbl">Zuletzt gedüngt</label>
        <input class="finput" id="f-lf" type="date">
      </div>
    </div>
    <div class="fg">
      <label class="flbl">Gekauft / Umgetopft am</label>
      <input class="finput" id="f-pur" type="date">
    </div>
    <div class="fg">
      <label class="flbl">Notizen</label>
      <textarea class="finput" id="f-notes" rows="2" placeholder="Optionale Notizen..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="savePlant()">Speichern</button>
  </div>
</div>

<!-- Sheet: User Switcher -->
<div class="overlay" id="ov-user" onclick="closeOverlay('ov-user',event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Benutzer</div>
    <div id="user-list"></div>
    <button class="btn btn-primary" style="margin-top:6px" onclick="addUser()">+ Neuer Benutzer</button>
  </div>
</div>

<!-- Image Preview -->
<div class="img-prev" id="img-prev" onclick="closeImgPreview()">
  <button class="img-prev-close">✕</button>
  <img id="img-prev-src" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="photo-input" accept="image/*" multiple style="display:none">

<script src="app.js"></script>
</body>
</html>
